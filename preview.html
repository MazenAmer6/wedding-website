<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      background: #fdfaf6;
      color: #4a4a4a;
    }

    h1 {
      text-align: center;
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: #3a3a3a;
      padding: 30px 0 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7aab6d;
      margin-bottom: 30px;
    }

    /* Grid of previews */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Each preview box */
    .preview-box {
      position: relative;
      height: 300px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.92);
      border: 1px solid #d4e6c3;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .preview-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.14);
    }

    .preview-box.selected {
      border: 3px solid #27592d;
      box-shadow: 0 0 0 4px rgba(39,89,45,0.2);
    }

    /* Label */
    .preview-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.92);
      padding: 12px 16px;
      border-top: 1px solid #d4e6c3;
      z-index: 10;
    }

    .preview-label .number {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7aab6d;
    }

    .preview-label .name {
      font-size: 1rem;
      font-weight: 400;
      color: #3a3a3a;
      margin: 2px 0;
    }

    .preview-label .desc {
      font-size: 0.75rem;
      color: #888;
      font-style: italic;
    }

    /* Select button */
    .select-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #27592d;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 10;
      font-family: 'Lato', sans-serif;
      transition: all 0.2s ease;
    }

    .select-btn:hover {
      background: #4a7a40;
      transform: scale(1.05);
    }

    /* Petals container inside each box */
    .petals-area {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .mini-petal {
      position: absolute;
      top: -40px;
      pointer-events: none;
      animation: minifall linear infinite;
    }

    .mini-petal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes minifall {
      0% {
        transform: translateY(-40px) rotate(0deg) scale(1);
        opacity: 1;
      }
      50% {
        transform: translateY(40%) rotate(180deg) translateX(15px) scale(0.9);
        opacity: 0.85;
      }
      100% {
        transform: translateY(110%) rotate(360deg) translateX(-10px) scale(0.7);
        opacity: 0;
      }
    }

    /* Result banner */
    .result-banner {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #27592d;
      color: white;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1rem;
      letter-spacing: 1px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 999;
      text-align: center;
    }

    .result-banner.show { display: block; }
  </style>
</head>

        const url  = URL.createObjectURL(blob);

        const img = document.createElement('img');
        img.src   = url;
        wrapper.appendChild(img);

        const size = 16 + Math.random() * 20;
        wrapper.style.left              = Math.random() * 100 + '%';
        wrapper.style.width             = size + 'px';
        wrapper.style.height            = size + 'px';
        wrapper.style.animationDuration = (4 + Math.random() * 6) + 's';

      btn.classList.add('select-btn');

          .forEach(b => b.classList.remove('selected'));
        box.classList.add('selected');
        document.getElementById('selectedName').textContent = opt.name;
        document.getElementById('result').classList.add('show');
        setTimeout(() => {
          document.getElementById('result').classList.remove('show');
        }, 4000);
      };

      box.appendChild(area);
      box.appendChild(btn);
      box.appendChild(label);
      grid.appendChild(box);

</html>
